disabled_rules:
  - trailing_whitespace
  - void_return
  - vertical_whitespace
  - trailing_comma
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - empty_string
  - discouraged_object_literal
  - fatal_error_message
  - first_where
  - last_where

line_length: 160
function_body_length: 60
type_body_length: 300
file_length: 500

excluded:
  - Pods
  - .bundle
  - Carthage
  - vendor
