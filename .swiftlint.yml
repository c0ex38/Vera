disabled_rules:
  - trailing_whitespace
  - void_return
  - multiple_closures_with_trailing_closure
  - cyclomatic_complexity
  - function_body_length

opt_in_rules:
  - empty_count
  - empty_string
  - contains_over_first_not_nil
  - sorted_imports

included:
  - Vera

excluded:
  - Pods
  - VeraTests
  - VeraUITests

line_length:
  warning: 160
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

naming:
  min_length: 3
  max_length: 40

reporter: "xcode"
